<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="robots" content="noindex, nofollow">
   <title>404 - Page Not Found | Jeet Enterprise</title>
   <meta name="description"
      content="The page you're looking for doesn't exist. Visit Jeet Enterprise homepage for quality electrical solutions.">
   <link rel="icon" type="image/png" href="/logo.png">
   <style>
      * {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      body {
         font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
         min-height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         padding: 20px;
      }

      .error-container {
         background: white;
         border-radius: 20px;
         padding: 60px 40px;
         max-width: 600px;
         text-align: center;
         box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }

      .logo {
         width: 120px;
         height: auto;
         margin-bottom: 30px;
      }

      h1 {
         font-size: 120px;
         color: #667eea;
         font-weight: 700;
         line-height: 1;
         margin-bottom: 20px;
      }

      h2 {
         font-size: 28px;
         color: #333;
         margin-bottom: 15px;
         font-weight: 600;
      }

      p {
         color: #666;
         font-size: 16px;
         line-height: 1.6;
         margin-bottom: 30px;
      }

      .links {
         display: flex;
         gap: 15px;
         flex-wrap: wrap;
         justify-content: center;
      }

      a {
         display: inline-block;
         padding: 12px 30px;
         background: #667eea;
         color: white;
         text-decoration: none;
         border-radius: 8px;
         font-weight: 600;
         transition: all 0.3s ease;
      }

      a:hover {
         background: #764ba2;
         transform: translateY(-2px);
         box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .secondary {
         background: #f3f4f6;
         color: #333;
      }

      .secondary:hover {
         background: #e5e7eb;
      }

      @media (max-width: 640px) {
         h1 {
            font-size: 80px;
         }

         h2 {
            font-size: 22px;
         }

         .error-container {
            padding: 40px 30px;
         }
      }
   </style>
</head>

<body>
   <div class="error-container">
      <img src="/logo.png" alt="Jeet Enterprise Logo" class="logo">
      <h1>404</h1>
      <h2>Oops! Page Not Found</h2>
      <p>The page you're looking for seems to have moved or doesn't exist. Don't worry, you can find what you need from
         our homepage.</p>
      <div class="links">
         <a href="/">Go to Homepage</a>
         <a href="/products" class="secondary">View Products</a>
         <a href="/contact" class="secondary">Contact Us</a>
      </div>
   </div>
</body>

</html>
